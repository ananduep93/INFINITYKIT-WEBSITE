<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's New - INFINITY KIT</title>
    <link rel="canonical" href="https://infinitykit.online/whatsnew">
    <link rel="stylesheet" href="app.css?v=1.0">
    <style>
        /* Transparent Layout for Background Animation (Light Theme) */
        body { background: #F8FAFC !important; color: #1E293B !important; transition: background 0.5s ease; }
        .navbar, .updates-container, .updates-header, .footer {
            background: transparent !important;
        }
        .update-card {
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            background-color: rgba(255, 255, 255, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.07) !important;
            border-radius: 24px !important;
            padding: 25px;
        }
        .updates-header h1 { color: #0F172A !important; background: none !important; -webkit-text-fill-color: initial !important; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-logo" onclick="location.href='/'">&#9889;INFINITY KIT</div>
        <div class="nav-right">
            <a href="index.html" style="color: white; text-decoration: none; font-weight: 500;">&larr; Back to Home</a>
        </div>
    </nav>

    <div class="updates-container">
        <div class="updates-header">
            <h1>What's New? 🚀</h1>
            <p>Stay updated with the latest features and tools in Infinity Kit.</p>
        </div>

        <div id="updatesList" class="update-list">
            <div class="loading-updates">Fetching latest updates...</div>
        </div>
    </div>

    <script type="module">
        import { db, collection, query, orderBy, getDocs } from './firebase-config.js';

        async function fetchUpdates() {
            const updatesList = document.getElementById('updatesList');
            try {
                const q = query(collection(db, 'updates'), orderBy('timestamp', 'desc'));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    updatesList.innerHTML = '<div class="loading-updates">No updates yet. Check back later!</div>';
                    return;
                }

                updatesList.innerHTML = '';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const date = data.timestamp ? data.timestamp.toDate() : new Date();
                    const formattedDate = date.toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    const card = document.createElement('div');
                    card.className = 'update-card';
                    card.innerHTML = `
                        <span class="update-date">${formattedDate}</span>
                        <div class="update-message">${data.message}</div>
                    `;
                    updatesList.appendChild(card);
                });
            } catch (error) {
                console.error("Error fetching updates: ", error);
                updatesList.innerHTML = '<div class="loading-updates">Error loading updates. Please try again.</div>';
            }
        }

        fetchUpdates();

        // Anti-flicker Theme Script
        (function() {
            try {
                const saved = localStorage.getItem('infinityKitSettings');
                if (saved) {
                    const settings = JSON.parse(saved);
                    if (settings.theme) {
                        document.documentElement.setAttribute('data-theme', settings.theme);
                    }
                }
            } catch (e) {}
        })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="main.js?v=1.7"></script>
    <script src="background.js?v=1.0"></script>
</body>
</html>
