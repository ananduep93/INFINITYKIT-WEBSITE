<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Toolkit - Infinity Kit⚡</title>
    <meta name="description" content="Access all PDF conversion and management tools in one place. Merge, split, rotate, and convert PDF files online for free.">
    <link rel="canonical" href="https://infinitykit.online/folder/pdf-toolkit">
    
    <link rel="stylesheet" href="../app.css?v=1.0">

    <nav class="navbar">
        <div class="nav-logo" onclick="location.href='/'">⚡INFINITY KIT</div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div class="nav-right" id="navRight">
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="../index.html#about-page">About</a>
                <a href="../index.html#contact-page">Contact</a>
            </div>
        </div>
    </nav>

    <div class="breadcrumb">
        <a href="/">Home</a>
        <span class="separator">&rsaquo;</span>
        <span class="current">PDF Toolkit</span>

    <main class="tool-page-container category-layout">

        </div>

    <script src="../notifications.js?v=1.0"></script>
    <script src="../main.js?v=1.0"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const folderId = 'pdf-toolkit';
            const folder = baseFolders.find(f => f.id === folderId);
            if (folder) {
                renderToolsInFolder(folder);
            }
        });
    </script>
