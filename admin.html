<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - INFINITY KIT</title>
    <link rel="canonical" href="https://infinitykit.online/admin">
    <link rel="stylesheet" href="app.css?v=1.0">
    <style>
        :root {
            --admin-primary: #667eea;
            --admin-secondary: #764ba2;
            --admin-bg: #f8f9fa;
            --admin-card-bg: #ffffff;
            --admin-text: #2d3436;
        }

        [data-theme="dark"] {
            --admin-bg: #1a1a2e;
            --admin-card-bg: #16213e;
            --admin-text: #e1e1e1;
        }

        body.admin-body {
            background: var(--admin-bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--admin-text);
            box-sizing: border-box;
        }

        .admin-card {
            background: var(--admin-card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .admin-card h2 {
            margin-bottom: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--admin-primary), var(--admin-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
            background: transparent;
            color: inherit;
            box-sizing: border-box;
        }

        [data-theme="dark"] .form-group input, 
        [data-theme="dark"] .form-group textarea {
            border-color: #2c3e50;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--admin-primary);
        }

        .admin-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--admin-primary), var(--admin-secondary));
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            margin-top: 1rem;
        }

        .admin-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .admin-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        #loginError {
            color: #ff4757;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }

        #adminPanel {
            display: none;
            width: 100%;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .admin-card {
            background: var(--admin-card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            transition: transform 0.3s ease;
            margin: 20px auto;
        }
        .success-msg {
            color: #2ecc71;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }
    </style>
</head>
<body class="admin-body">

    <!-- Back to Home Button -->
    <a href="index.html" style="position: fixed; top: 20px; left: 20px; text-decoration: none; color: #1E293B; font-weight: 600; display: flex; align-items: center; gap: 8px; z-index: 100; background: white; padding: 8px 16px; border-radius: 12px; border: 1px solid #E2E8F0; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Home
    </a>

    <!-- Login Form Section -->
    <div id="loginSection" class="admin-card">
        <h2>Admin Login</h2>
        <div class="form-group">
            <label for="username">Email Address</label>
            <input type="email" id="username" placeholder="Enter your admin email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button id="loginBtn" class="admin-btn">Login with Email</button>
        
        <div style="display: flex; align-items: center; margin: 20px 0; color: #64748B; font-size: 0.85rem;">
            <div style="flex: 1; height: 1px; background: #E2E8F0;"></div>
            <span style="padding: 0 10px;">OR</span>
            <div style="flex: 1; height: 1px; background: #E2E8F0;"></div>
        </div>

        <button id="googleLoginBtn" class="admin-btn" style="background: white; color: #1E293B; border: 1px solid #E2E8F0; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.67-.35-1.39-.35-2.09s.13-1.42.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </button>

        <p id="loginError">Invalid credentials</p>
    </div>

    <!-- Admin Panel Section -->
    <div id="adminPanel" style="display: none;">
        <!-- Post Update Card -->
        <div class="admin-card" style="margin-bottom: 2rem;">
            <h2>Post Update</h2>
            <p style="margin-bottom: 20px; opacity: 0.8;">Post a new update to the website</p>
            <div class="form-group">
                <label for="updateMessage">Update Message</label>
                <textarea id="updateMessage" placeholder="What's new?"></textarea>
            </div>
            <button id="submitUpdate" class="admin-btn">Post Update ✨</button>
            <p id="successMsg" class="success-msg">Update posted successfully!</p>
        </div>

        <!-- Affiliate Ad Card -->
        <div class="admin-card">
            <h2>Affiliate Ad</h2>
            <p style="margin-bottom: 20px; opacity: 0.8;">Add a new affiliate product</p>
            <div class="form-group">
                <label for="productTitle">Product Title</label>
                <input type="text" id="productTitle" placeholder="Enter product name">
            </div>
            <div class="form-group">
                <label for="affiliateLink">Affiliate Link</label>
                <input type="url" id="affiliateLink" placeholder="https://...">
            </div>
            <div class="form-group">
                <label for="mediaLink">Media (Image) Link</label>
                <input type="url" id="mediaLink" placeholder="Image URL">
            </div>
            <button id="submitAffiliate" class="admin-btn">Add Product 🎁</button>
            <p id="affiliateSuccessMsg" class="success-msg">Product added successfully!</p>
        </div>
    </div>

    <script type="module">
        import { auth, db, collection, addDoc, serverTimestamp, doc, getDoc } from './firebase-config.js';
        import { onAuthStateChanged, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
 
        const loginSection = document.getElementById('loginSection');
        const adminPanel = document.getElementById('adminPanel');
        const loginBtn = document.getElementById('loginBtn');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const usernameInput = document.getElementById('username'); // Now used as Email
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('loginError');

        const submitUpdateBtn = document.getElementById('submitUpdate');
        const updateMessage = document.getElementById('updateMessage');
        const successMsg = document.getElementById('successMsg');

        const submitAffiliateBtn = document.getElementById('submitAffiliate');
        const productTitle = document.getElementById('productTitle');
        const affiliateLink = document.getElementById('affiliateLink');
        const mediaLink = document.getElementById('mediaLink');
        const affiliateSuccessMsg = document.getElementById('affiliateSuccessMsg');

        // Secure Login Logic with Firebase Auth
        loginBtn.addEventListener('click', async () => {
            const email = usernameInput.value.trim();
            const pass = passwordInput.value;

            if (!email || !pass) return;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Verifying...';

            try {
                // Validate email format before sending to Firebase
                if (!email.includes('@')) {
                    throw new Error('Please enter a valid email address.');
                }

                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                
                console.log("DEBUG (Email): User UID is:", user.uid);

                // Check RBAC in Firestore
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                const userData = userDoc.data();
                
                console.log("DEBUG (Email): Firestore Data found:", userData);

                if (userData && userData.role === 'admin') {
                    showAdminPanel();
                } else {
                    console.warn("DEBUG (Email): Access Denied. Role is:", userData ? userData.role : 'undefined');
                    throw new Error('Unauthorized: This account does not have Admin privileges.');
                }
            } catch (error) {
                handleLoginError(error);
            }
        });

        // Google Login Logic
        googleLoginBtn.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            googleLoginBtn.disabled = true;
            googleLoginBtn.textContent = 'Verifying Google Account...';

            try {
                const userCredential = await signInWithPopup(auth, provider);
                const user = userCredential.user;
                
                console.log("DEBUG: User logged in. UID is:", user.uid);

                const userDoc = await getDoc(doc(db, 'users', user.uid));
                const userData = userDoc.data();
                
                console.log("DEBUG: Firestore Data found:", userData);

                if (userData && userData.role === 'admin') {
                    showAdminPanel();
                } else {
                    console.warn("DEBUG: Access Denied. Role is:", userData ? userData.role : 'undefined');
                    throw new Error('Unauthorized: This Google account does not have Admin privileges.');
                }
            } catch (error) {
                handleLoginError(error);
            }
        });

        function handleLoginError(error) {
            console.error("Login Error Object:", error);
            const msg = error.message || '';
            
            let errorMsg = 'An unexpected error occurred.';
            
            if (msg.includes('Unauthorized') || msg.includes('privileges')) {
                errorMsg = '⛔ Access Denied: You are not an Admin. Please check your Firestore "role" field.';
            } else if (msg.includes('email-address')) {
                errorMsg = '📧 Invalid email format.';
            } else if (error.code === 'auth/user-not-found') {
                errorMsg = '❓ No account found with this email.';
            } else if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                errorMsg = '🔑 Incorrect email or password.';
            } else if (error.code === 'auth/popup-closed-by-user') {
                errorMsg = '🚫 Login cancelled.';
            } else if (msg) {
                errorMsg = msg; // Show the specific thrown error if possible
            }
            
            loginError.textContent = errorMsg;
            loginError.style.display = 'block';
            setTimeout(() => {
                loginError.style.display = 'none';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login with Email';
                googleLoginBtn.disabled = false;
                googleLoginBtn.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.67-.35-1.39-.35-2.09s.13-1.42.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Sign in with Google
                `;
            }, 5000);
        }

        function showAdminPanel() {
            loginSection.style.display = 'none';
            adminPanel.style.display = 'block';
            document.body.style.alignItems = 'flex-start';
            document.body.style.padding = '2rem 0';
        }

        // Persistence check
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists() && userDoc.data().role === 'admin') {
                    showAdminPanel();
                }
            }
        });

        // Submit Update Logic
        submitUpdateBtn.addEventListener('click', async () => {
            const message = updateMessage.value.trim();
            if (!message) return;

            submitUpdateBtn.disabled = true;
            submitUpdateBtn.textContent = 'Uploading...';
            successMsg.style.display = 'none';

            try {
                await addDoc(collection(db, 'updates'), {
                    message: message,
                    timestamp: serverTimestamp()
                });

                successMsg.style.display = 'block';
                updateMessage.value = '';
                
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 4000);
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("Failed to post update. Check console.");
            } finally {
                submitUpdateBtn.disabled = false;
                submitUpdateBtn.textContent = 'Post Update ✨';
            }
        });

        // Submit Affiliate Logic
        submitAffiliateBtn.addEventListener('click', async () => {
            const title = productTitle.value.trim();
            const aLink = affiliateLink.value.trim();
            const mLink = mediaLink.value.trim();

            if (!title || !aLink || !mLink) {
                alert("Please fill all fields");
                return;
            }

            submitAffiliateBtn.disabled = true;
            submitAffiliateBtn.textContent = 'Saving...';
            affiliateSuccessMsg.style.display = 'none';

            try {
                await addDoc(collection(db, 'affiliateAds'), {
                    title: title,
                    affiliateLink: aLink,
                    mediaLink: mLink,
                    timestamp: serverTimestamp()
                });

                affiliateSuccessMsg.style.display = 'block';
                productTitle.value = '';
                affiliateLink.value = '';
                mediaLink.value = '';
                
                setTimeout(() => {
                    affiliateSuccessMsg.style.display = 'none';
                }, 4000);
            } catch (error) {
                console.error("Error adding affiliate: ", error);
                alert("Failed to add product. Check console.");
            } finally {
                submitAffiliateBtn.disabled = false;
                submitAffiliateBtn.textContent = 'Add Product 🎁';
            }
        });

        // Anti-flicker Theme Script integration
        (function() {
            try {
                const saved = localStorage.getItem('infinityKitSettings');
                if (saved) {
                    const settings = JSON.parse(saved);
                    if (settings.theme) {
                        document.documentElement.setAttribute('data-theme', settings.theme);
                    }
                }
            } catch (e) {}
        })();
    </script>
</body>
</html>
