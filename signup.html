<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Infinity Kit⚡</title>
    <link rel="canonical" href="https://infinitykit.online/signup">
    <link rel="stylesheet" href="app.css?v=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0145F2;
            --background-color: #F8FAFC;
            --text-color: #1E293B;
            --subtitle-color: #64748B;
            --card-bg: rgba(255, 255, 255, 0.7);
            --input-bg: rgba(241, 245, 249, 0.8);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #F8FAFC !important;
            margin: 0;
            padding: 0;
            color: var(--text-color);
            overflow-x: hidden;
        }

        .auth-card {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background: var(--card-bg) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1) !important;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: authFadeIn 0.6s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes authFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            margin-bottom: 20px;
        }

        .auth-logo svg {
            width: 80px;
            height: 80px;
        }

        .auth-title {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: var(--text-color);
            text-transform: uppercase;
        }

        .auth-subtitle {
            font-size: 1rem;
            color: var(--subtitle-color);
            margin-bottom: 40px;
        }

        .auth-form {
            text-align: left;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .input-field {
            width: 100%;
            padding: 16px;
            background: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 15px;
            color: var(--text-color);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-color);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
            font-family: inherit;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: var(--subtitle-color);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E2E8F0;
        }

        .divider span {
            padding: 0 16px;
        }

        /* Google Sign In Button - Premium Style */
        .google-btn {
            width: 100%;
            height: 55px;
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            font-family: inherit;
            color: var(--text-color);
            font-weight: 700;
            font-size: 1rem;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            border-color: #CBD5E1;
        }

        .google-btn svg {
            width: 24px;
            height: 24px;
        }

        .auth-footer {
            margin-top: 40px;
            font-size: 1rem;
            color: var(--subtitle-color);
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
        }

        .back-to-home {
            position: absolute;
            top: 24px;
            left: 24px;
            color: var(--text-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .back-to-home:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="/" class="back-to-home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Home
        </a>

        <div class="auth-card">
            <div class="auth-logo">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18.6 6.62c-1.44 0-2.8.56-3.77 1.53L12 11.06l-2.83-2.91a5.3 5.3 0 00-3.77-1.53c-1.44 0-2.8.56-3.77 1.53A5.32 5.32 0 00.1 12c0 1.44.56 2.8 1.53 3.77a5.32 5.32 0 003.77 1.53c1.44 0 2.8-.56 3.77-1.53L12 12.94l2.83 2.91a5.3 5.3 0 003.77 1.53c1.44 0 2.8-.56 3.77-1.53A5.32 5.32 0 0023.9 12a5.32 5.32 0 00-1.53-3.77 5.32 5.32 0 00-3.77-1.53zm-13.2 7.15c-.48.48-1.12.75-1.8.75s-1.32-.27-1.8-.75A2.53 2.53 0 011.05 12c0-.68.27-1.32.75-1.8.48-.48 1.12-.75 1.8-.75s1.32.27 1.8.75l2.42 2.49-2.42 2.08zm13.2 0c-.48.48-1.12.75-1.8.75s-1.32-.27-1.8-.75l-2.42-2.49 2.42-2.08c.48-.48 1.12-.75 1.8-.75s1.32.27 1.8.75c.48.48.75 1.12.75 1.8s-.27 1.32-.75 1.8z" fill="#2563EB"/>
                </svg>
            </div>
            
            <h1 class="auth-title">Infinity Kit</h1>
            <p class="auth-subtitle">Create an account to sync your tools.</p>

            <form class="auth-form" onsubmit="return false;">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="nameInput" class="input-field" placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="emailInput" class="input-field" placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="passwordInput" class="input-field" placeholder="••••••••">
                </div>
                <button class="btn-primary" id="emailSignUpBtn">Create Account</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <button class="google-btn" id="googleSignInBtn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.67-.35-1.39-.35-2.09s.13-1.42.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>

            <div class="auth-footer">
                Already have an account? <a href="signin.html">Sign In</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="main.js?v=1.7"></script>
    <script src="background.js?v=1.0"></script>
    <script type="module">
        import { authService } from './auth.js';
        import { syncService } from './sync.js';
        import { authUI } from './auth-ui.js';

        const emailSignUpBtn = document.getElementById('emailSignUpBtn');
        const nameInput = document.getElementById('nameInput');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');

        // Email/Password Sign Up
        emailSignUpBtn.addEventListener('click', async () => {
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!name || !email || !password) {
                alert('Please fill in all fields.');
                return;
            }

            if (password.length < 6) {
                alert('Password must be at least 6 characters long.');
                return;
            }

            emailSignUpBtn.disabled = true;
            emailSignUpBtn.innerText = 'Creating account...';

            try {
                await authService.signUpWithEmail(email, password, name);
                await syncService.syncLocalToCloud();
                authUI.showToast('Account created successfully! Welcome! 🚀', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } catch (error) {
                console.error(error);
                alert('Account creation failed: ' + error.message);
                emailSignUpBtn.disabled = false;
                emailSignUpBtn.innerText = 'Create Account';
            }
        });

        // Google Sign In
        const googleSignInBtn = document.getElementById('googleSignInBtn');
        googleSignInBtn.addEventListener('click', async () => {
            try {
                await authService.loginWithGoogle();
                if (authService.isLoggedIn()) {
                    await syncService.syncLocalToCloud();
                    authUI.showToast('Successfully signed in with Google! 🚀', 'success');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                }
            } catch (error) {
                console.error(error);
                if (error.code !== 'auth/popup-closed-by-user') {
                    alert('Google sign in failed: ' + error.message);
                }
            }
        });
    </script>
</body>
</html>
