<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Men AI Prompts - Free Online Tool | Infinity Kit</title>
    <link rel="canonical" href="https://infinitykit.online/tools/men-prompts">
    <meta name="description" content="Discover AI generated prompts and images for Men. Free online tool from Infinity Kit.">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8795968572402515" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="../app.css?v=1.5">
    <link rel="stylesheet" href="../tools-style.css?v=1.5">
    
    <style>
        .prompts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .prompt-card {
            background: var(--card-bg, #fff);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .prompt-card:hover {
            transform: translateY(-5px);
        }
        .prompt-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }
        .prompt-content {
            padding: 15px;
        }
        .prompt-text {
            font-size: 0.9rem;
            color: var(--text-color, #333);
            margin-bottom: 10px;
            word-wrap: break-word;
        }
        .copy-btn {
            background: #4F46E5;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }
        .copy-btn:hover {
            background: #4338ca;
        }
        [data-theme="dark"] .prompt-text {
            color: #e1e1e1;
        }
        [data-theme="dark"] .prompt-card {
            background: #1e293b;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo" onclick="location.href='/'">⚡INFINITY KIT</div>
        <div class="nav-right" id="navRight">
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/about">About</a>
            </div>
        </div>
    </nav>
    <div class="breadcrumb">
        <a href="/">Home</a>
        <span class="separator">&rsaquo;</span>
        <a href="../folder/ai-prompts.html">AI Prompts</a>
        <span class="separator">&rsaquo;</span>
        <span class="current">men-prompts</span>
    </div>

    <main class="tool-page-container">
        <a href='../folder/ai-prompts.html' class='back-link' id='backToFolders'>
            <span>&larr;</span> Back to Folders
        </a>

        <div class="tool-header">
            <h1 class="tool-title">👨 AI Prompts for Men</h1>
        </div>

        <div id="toolContent" class="glass-panel" style="background: transparent; box-shadow: none; padding: 0;">
            <div id="loadingPrompts" style="text-align: center; padding: 40px; font-size: 1.2rem;">Loading prompts...</div>
            <div id="promptsContainer" class="prompts-grid"></div>
        </div>

    </main>

    <footer class="footer">
        <!-- Add footer content if needed -->
    </footer>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from '../firebase-api-keys.js';
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function fetchPrompts() {
            const container = document.getElementById('promptsContainer');
            const loading = document.getElementById('loadingPrompts');
            
            try {
                const promptsRef = collection(db, 'aiPrompts');
                const q = query(promptsRef, where("category", "==", "men"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                
                loading.style.display = 'none';
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No prompts found for this category yet.</p>';
                    return;
                }
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = 'prompt-card';
                    
                    // Simple escape to prevent XSS
                    const safePrompt = data.prompt.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    
                    card.innerHTML = `
                        <img src="${data.imageUrl}" class="prompt-img" alt="AI Prompt preview">
                        <div class="prompt-content">
                            <div class="prompt-text">${safePrompt}</div>
                            <button class="copy-btn" onclick="copyPrompt(\`${safePrompt}\`, this)">Copy Prompt</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error fetching prompts:", error);
                loading.textContent = 'Failed to load prompts. Please try again later.';
            }
        }

        window.copyPrompt = function(text, btnElement) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btnElement.textContent;
                btnElement.textContent = 'Copied! ✅';
                btnElement.style.background = '#10B981';
                setTimeout(() => {
                    btnElement.textContent = originalText;
                    btnElement.style.background = '#4F46E5';
                }, 2000);
            });
        };

        document.addEventListener('DOMContentLoaded', () => {
            fetchPrompts();
            
            if (typeof trackToolUsage === 'function') trackToolUsage('men-prompts');
            if (typeof addRecentTool === 'function') addRecentTool('men-prompts', 'Men Prompts');
        });
    </script>

    <script src="../main.js?v=1.5"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="../background.js"></script>
</body>
</html>
