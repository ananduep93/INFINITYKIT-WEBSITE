    <style>
        .prompts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .prompt-card {
            background: var(--card-bg, #fff);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .prompt-card:hover {
            transform: translateY(-5px);
        }
        .prompt-img {
            width: 100%;
            height: auto;
            display: block;
        }
        .prompt-content {
            padding: 15px;
        }
        .prompt-text {
            font-size: 0.9rem;
            color: var(--text-color, #333);
            margin-bottom: 10px;
            word-wrap: break-word;
        }
        .copy-btn {
            background: #4F46E5;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }
        .copy-btn:hover {
            background: #4338ca;
        }
        [data-theme="dark"] .prompt-text {
            color: #e1e1e1;
        }
        [data-theme="dark"] .prompt-card {
            background: #1e293b;
        }
        .prompt-img {
            cursor: pointer;
        }
        /* Modal Lightbox styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 20, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal.show {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.85);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal.show .modal-content {
            transform: scale(1);
        }
        .close-btn {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #fff;
            font-size: 38px;
            font-weight: 300;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
        }
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }
    </style>

        <div id="toolContent" class="glass-panel" style="background: transparent; box-shadow: none; padding: 0;">

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from '../firebase-api-keys.js';
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function fetchPrompts() {
            const container = document.getElementById('promptsContainer');
            const loading = document.getElementById('loadingPrompts');
            
            try {
                const promptsRef = collection(db, 'aiPrompts');
                // Querying with category but without orderBy to avoid needing a Firestore Composite Index
                const q = query(promptsRef, where("category", "==", "men"));
                const querySnapshot = await getDocs(q);
                
                loading.style.display = 'none';
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No prompts found for this category yet.</p>';
                    return;
                }

                // Convert to array and sort in memory by timestamp descending
                const prompts = [];
                querySnapshot.forEach((doc) => {
                    prompts.push({ id: doc.id, ...doc.data() });
                });

                prompts.sort((a, b) => {
                    const t1 = a.timestamp ? (a.timestamp.seconds || 0) : 0;
                    const t2 = b.timestamp ? (b.timestamp.seconds || 0) : 0;
                    return t2 - t1;
                });
                
                prompts.forEach((data) => {
                    const card = document.createElement('div');
                    card.className = 'prompt-card';
                    
                    // Simple escape to prevent XSS
                    const safePrompt = data.prompt.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    
                    card.innerHTML = `
                        <img src="${data.imageUrl}" class="prompt-img" alt="AI Prompt preview">
                        <div class="prompt-content">
                            <div class="prompt-text">${safePrompt}</div>
                            <button class="copy-btn" onclick="copyPrompt(\`${safePrompt}\`, this)">Copy Prompt</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error fetching prompts:", error);
                loading.textContent = 'Failed to load prompts. Please try again later.';
            }
        }

        window.copyPrompt = function(text, btnElement) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btnElement.textContent;
                btnElement.textContent = 'Copied! ✅';
                btnElement.style.background = '#10B981';
                setTimeout(() => {
                    btnElement.textContent = originalText;
                    btnElement.style.background = '#4F46E5';
                }, 2000);
            });
        };

        document.addEventListener('DOMContentLoaded', () => {
            fetchPrompts();
            
            if (typeof trackToolUsage === 'function') trackToolUsage('men-prompts');
            if (typeof addRecentTool === 'function') addRecentTool('men-prompts', 'Men Prompts');

            // Modal logic for viewing full size image
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            const closeBtn = document.querySelector('.close-btn');

            document.getElementById('promptsContainer').addEventListener('click', (e) => {
                if (e.target.classList.contains('prompt-img')) {
                    modal.style.display = "flex";
                    setTimeout(() => {
                        modal.classList.add('show');
                        modalImg.src = e.target.src;
                    }, 10);
                }
            });

            function closeModal() {
                modal.classList.remove('show');
                setTimeout(() => {
                    modal.style.display = "none";
                    modalImg.src = "";
                }, 300);
            }

            closeBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });
        });
    </script>

    <!-- Image Viewer Modal Lightbox -->
    <div id="imageModal" class="modal">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="modalImage" alt="Full size preview">
    </div>
