<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Helper | Infinity Kit ⚡</title>
    <link rel="stylesheet" href="../app.css">
    <script>document.documentElement.setAttribute('data-theme', 'light');</script>
    <style>
        body { background-color: #f0f2f5; }
        .tool-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .breadcrumb { font-size: 0.9rem; color: #666; margin-bottom: 20px; }
        .breadcrumb a { color: #4a6cf7; text-decoration: none; }
        .glass-panel { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); }
        h2 { color: #333; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-top: 15px; font-size: 1rem; }
        .hero-cta { background: #4a6cf7; color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: 600; cursor: pointer; margin-top: 20px; width: 100%; }
        pre { background: #1a1a2e; color: #e0e0e0; padding: 20px; border-radius: 12px; margin-top: 20px; min-height: 100px; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo" onclick="window.location.href='../index.html'">⚡ INFINITY KIT</div>
    </nav>
    <div class="tool-container">
        <div class="breadcrumb"><a href="../index.html">Home</a> &nbsp;&rsaquo;&nbsp; <a href="index.html">AI Tools</a> &nbsp;&rsaquo;&nbsp; Code Helper</div>
        <div class="glass-panel">
            <h2>💻 AI Code Helper</h2>
            <p style="color: #666;">Debug, explain, or convert your code instantly.</p>
            <select id="help-type">
                <option value="explain">Explain Code</option>
                <option value="fix">Fix Errors</option>
                <option value="convert">Convert Code</option>
            </select>
            <textarea id="code-input" rows="10" placeholder="Paste your code here..."></textarea>
            <button id="help-btn" class="hero-cta">Get AI Help 🚀</button>
            <div id="output-container" style="margin-top: 30px;">
                <h3 style="font-size: 1.1rem; color: #333;">AI Response:</h3>
                <pre id="code-output"></pre>
            </div>
        </div>
    </div>
    <script type="module">
        import { authService } from '../auth.js';
        authService.onAuthChange((user) => { if (!user) window.location.href = '../signin.html'; });
    </script>
    <script src="script.js"></script>
</body>
</html>
