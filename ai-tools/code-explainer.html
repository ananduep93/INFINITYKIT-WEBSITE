<body>
    <nav class="navbar">
        <div class="nav-logo" onclick="window.location.href='/'">⚡ INFINITY KIT</div>
    </nav>

    <div class="tool-container">
        <div class="breadcrumb">
            <a href="/">Home</a> &nbsp;&rsaquo;&nbsp; <a href="/ai-tools">AI Tools</a> &nbsp;&rsaquo;&nbsp; Code Explainer
        </div>

        <div class="input-card">
            <h2>💻 AI Code Explainer</h2>
            <p>Paste any code snippet below and Infinity AI will explain exactly what it does and how to improve it.</p>
            
            <textarea id="textInput" class="text-area" placeholder="Paste your code here..."></textarea>
            
            <button id="processBtn" class="action-btn">Explain Code with AI ⚡</button>
        </div>

        <div id="resultCard" class="result-card">
            <div class="result-header">
                <div class="result-title">AI Explanation</div>
                <button class="copy-btn" id="copyBtn">
                    📋 Copy
                </button>
            </div>
            <div id="resultContent" class="result-content"></div>
        </div>
    </div>

    <script type="module" src="script.js?v=1.1"></script>
    <script type="module">
        import { authService } from '../auth.js';
        
        const processBtn = document.getElementById('processBtn');
        const textInput = document.getElementById('textInput');
        const resultCard = document.getElementById('resultCard');
        const resultContent = document.getElementById('resultContent');
        const copyBtn = document.getElementById('copyBtn');

        authService.onAuthChange((user) => { 
            if (!user) window.location.href = '/signin.html'; 
        });

        processBtn.onclick = async () => {
            const code = textInput.value.trim();
            if (!code) return;

            processBtn.disabled = true;
            processBtn.textContent = 'Explaining...';
            resultCard.style.display = 'none';

            try {
                if (window.askAI) {
                    const response = await window.askAI('code', code);
                    resultCard.style.display = 'block';
                    resultContent.innerHTML = window.marked ? marked.parse(response) : response;
                    resultCard.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (err) {
                alert("Failed to explain code.");
            } finally {
                processBtn.disabled = false;
                processBtn.textContent = 'Explain Code with AI ⚡';
            }
        };

        copyBtn.onclick = () => {
            const text = resultContent.textContent;
            if (!text) return;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => copyBtn.innerHTML = '📋 Copy', 2000);
                });
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => copyBtn.innerHTML = '📋 Copy', 2000);
            }
        };
    </script>
