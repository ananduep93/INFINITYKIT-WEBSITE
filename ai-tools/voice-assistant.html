<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Assistant | Infinity Kit ⚡</title>
    <link rel="stylesheet" href="../app.css">
    <script>document.documentElement.setAttribute('data-theme', 'light');</script>
    <style>
        body { background-color: #f0f2f5; }
        .tool-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .breadcrumb { font-size: 0.9rem; color: #666; margin-bottom: 20px; }
        .breadcrumb a { color: #4a6cf7; text-decoration: none; }
        .glass-panel { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); text-align: center; }
        h2 { color: #333; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .voice-controls { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 30px; }
        .mic-btn { width: 80px; height: 80px; border-radius: 50%; background: #4a6cf7; border: none; color: white; font-size: 2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(74, 108, 247, 0.3); }
        .mic-btn.recording { background: #f56565; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #voice-output { background: #f8f9fa; border: 1px solid #eee; border-radius: 12px; padding: 20px; margin-top: 20px; width: 100%; min-height: 80px; color: #333; text-align: left; }
        .hero-cta { background: #4a6cf7; color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo" onclick="window.location.href='../index.html'">⚡ INFINITY KIT</div>
    </nav>
    <div class="tool-container">
        <div class="breadcrumb"><a href="../index.html">Home</a> &nbsp;&rsaquo;&nbsp; <a href="index.html">AI Tools</a> &nbsp;&rsaquo;&nbsp; Voice Assistant</div>
        <div class="glass-panel">
            <h2>🎙️ Voice Assistant</h2>
            <p style="color: #666;">Ask a question using your voice and hear the AI response.</p>
            <div class="voice-controls">
                <button id="mic-btn" class="mic-btn">🎙️</button>
                <p id="status-text" style="color: #4a6cf7; font-weight: 500;">Click to start speaking</p>
            </div>
            <div id="voice-output-container" style="margin-top: 30px;">
                <h3 style="font-size: 1.1rem; color: #333; text-align: left;">Transcription:</h3>
                <div id="voice-output"></div>
                <h3 style="font-size: 1.1rem; color: #333; text-align: left; margin-top: 20px;">AI Answer:</h3>
                <div id="ai-answer" style="background: #eef2ff; padding: 20px; border-radius: 12px; text-align: left; min-height: 80px;"></div>
            </div>
        </div>
    </div>
    <script type="module">
        import { authService } from '../auth.js';
        authService.onAuthChange((user) => { if (!user) window.location.href = '../signin.html'; });
    </script>
    <script src="script.js"></script>
</body>
</html>
